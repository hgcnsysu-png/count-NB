<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guan-cheng 3C - 雲端即時筆電展示櫃</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        // ==========================================
        //  請在下方貼上你在 Firebase 申請到的金鑰設定
        // ==========================================
        const firebaseConfig = {
            apiKey: "你的_API_KEY",
            authDomain: "你的_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://你的_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "你的_PROJECT_ID",
            storageBucket: "你的_PROJECT_ID.appspot.com",
            messagingSenderId: "你的_SENDER_ID",
            appId: "你的_APP_ID"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'showcase_data');

        // 全域變數
        let totalSlots = 108;
        let slotStates = {};

        // 監聽雲端資料庫變更（異地同步的核心：只要雲端一變，所有人畫面立刻跟著變）
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                totalSlots = data.totalSlots || 108;
                slotStates = data.slotStates || {};
            } else {
                // 如果資料庫是空的，初始化預設值
                totalSlots = 108;
                slotStates = {};
            }
            renderShowcase();
        });

        // 傳送最新資料到雲端
        function pushToCloud() {
            set(dbRef, {
                totalSlots: totalSlots,
                slotStates: slotStates
            });
        }

        // 補零功能 (將 1 變成 001)
        function formatNumber(num) {
            return String(num).padStart(3, '0');
        }

        // 渲染展示櫃畫面
        function renderShowcase() {
            const container = document.getElementById('showcase-container');
            container.innerHTML = ''; 

            let usedCount = 0;

            for (let i = 1; i <= totalSlots; i++) {
                const isUsed = slotStates[i] || false;
                if (isUsed) usedCount++;

                const slotDiv = document.createElement('div');
                slotDiv.className = `slot ${isUsed ? 'used' : ''}`;
                
                slotDiv.innerHTML = `
                    <span>NB-${formatNumber(i)}</span>
                    <span class="status-text">${isUsed ? '已佔用' : '空置中'}</span>
                `;

                // 點擊事件：切換本地狀態並直接推送到雲端
                slotDiv.onclick = () => {
                    slotStates[i] = !slotStates[i];
                    pushToCloud();
                };

                container.appendChild(slotDiv);
            }

            document.getElementById('stats-display').innerText = 
                `總計: ${totalSlots} 格 | 已使用: ${usedCount} (紅) | 空置: ${totalSlots - usedCount} (綠)`;
        }

        // 綁定按鈕事件到全域，讓 HTML 按鈕可以呼叫
        window.changeSlots = function(amount) {
            const newTotal = totalSlots + amount;
            if (newTotal < 1) {
                alert("格子數量不能少於 1 格！");
                return;
            }
            
            if (amount < 0) {
                for (let i = totalSlots; i > newTotal; i--) {
                    delete slotStates[i];
                }
            }

            totalSlots = newTotal;
            pushToCloud();
        };

        window.resetAll = function() {
            if(confirm("確定要將所有格子重設為「空置 (綠色)」嗎？")) {
                slotStates = {};
                pushToCloud();
            }
        };
    </script>
    <style>
        :root {
            --used-color: #ff4d4d;
            --empty-color: #2ecc71;
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        header {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 { margin: 0; font-size: 24px; color: #2c3e50; }
        .controls { display: flex; gap: 10px; align-items: center; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-add { background-color: #3498db; color: white; }
        .btn-add:hover { background-color: #2980b9; }
        .btn-remove { background-color: #e74c3c; color: white; }
        .btn-remove:hover { background-color: #c0392b; }
        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-reset:hover { background-color: #7f8c8d; }
        .stats { font-size: 14px; color: #7f8c8d; }
        .showcase {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
            background: #e0e0e0;
            padding: 20px;
            border-radius: 12px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.1);
            border-bottom: 8px solid #bdc3c7;
        }
        .slot {
            aspect-ratio: 1 / 1;
            background-color: var(--empty-color);
            color: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1), inset 0 -4px 0 rgba(0,0,0,0.15);
            transition: transform 0.1s, background-color 0.3s;
        }
        .slot:hover { transform: scale(1.05); }
        .slot.used { background-color: var(--used-color); }
        .slot .status-text { font-size: 11px; margin-top: 5px; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 10px; font-weight: normal; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>雲端即時筆電展示櫃</h1>
            <div class="stats" id="stats-display">同步中...</div>
        </div>
        <div class="controls">
            <button class="btn-add" onclick="changeSlots(1)">＋ 增加 1 格</button>
            <button class="btn-remove" onclick="changeSlots(-1)">－ 減少 1 格</button>
            <button class="btn-reset" onclick="resetAll()">全部清空 (綠色)</button>
        </div>
    </header>

    <div class="showcase" id="showcase-container"></div>

</body>
</html>
