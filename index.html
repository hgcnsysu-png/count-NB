<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>筆電庫存管理系統</title>
    <style>
        :root { --used-color: #ff4d4d; --empty-color: #2ecc71; --selected-color: #f1c40f; --bg-color: #f5f6fa; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); padding: 20px; margin: 0; }
        header { max-width: 1200px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 10px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .showcase { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .slot { aspect-ratio: 1 / 1; background-color: var(--empty-color); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 8px; cursor: pointer; border: 4px solid transparent; transition: 0.2s; }
        .slot.used { background-color: var(--used-color); }
        .slot.selected { border-color: var(--selected-color); transform: scale(0.95); }
        .status-text { font-size: 10px; margin-top: 5px; background: rgba(0,0,0,0.2); padding: 2px 5px; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>筆電展示櫃管理</h1>
        <div id="stats">資料載入中...</div>
    </div>
    <div class="controls">
        <button id="batch-btn" onclick="toggleBatchMode()" style="background:#3498db; color:white;">進入批量模式</button>
        <button onclick="batchAction(true)" style="background:#e74c3c; color:white;">設為已佔用</button>
        <button onclick="batchAction(false)" style="background:#2ecc71; color:white;">設為空置</button>
    </div>
</header>

<div class="showcase" id="showcase-container"></div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_0wlc65UHInqCfYtaAn1AEVwlyHuNKPJz9QA4HL9cDVqKSPOmIy-WArI0mSgm4FNW/exec";
    
    let totalSlots = 108;
    let slotStates = {};
    let isBatchMode = false;
    let selectedSlots = new Set();

    // 載入資料
    async function loadData() {
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            totalSlots = data.totalSlots || 108;
            slotStates = data.slotStates || {};
            render();
        } catch (e) {
            document.getElementById('stats').innerText = "連線錯誤，請確認部署設定。";
        }
    }

    // 同步到 Google 試算表
    async function saveToGoogle() {
        document.getElementById('stats').innerText = "同步中...";
        try {
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "update", totalSlots, slotStates })
            });
            loadData();
        } catch (e) {
            alert("同步失敗，請確認網路與 GAS 權限。");
            loadData();
        }
    }

    // 渲染畫面
    function render() {
        const container = document.getElementById('showcase-container');
        container.innerHTML = '';
        let usedCount = 0;

        for (let i = 1; i <= totalSlots; i++) {
            if (slotStates[i]) usedCount++;
            const div = document.createElement('div');
            div.className = `slot ${slotStates[i] ? 'used' : ''} ${selectedSlots.has(i) ? 'selected' : ''}`;
            div.innerHTML = `<span>NB-${String(i).padStart(3, '0')}</span><span class="status-text">${slotStates[i] ? '佔用' : '空置'}</span>`;
            
            // 使用閉包確保點擊事件綁定正確的編號 i
            div.onclick = (function(index) {
                return function() {
                    if (isBatchMode) {
                        selectedSlots.has(index) ? selectedSlots.delete(index) : selectedSlots.add(index);
                        render();
                    } else {
                        slotStates[index] = !slotStates[index];
                        saveToGoogle();
                    }
                };
            })(i);
            
            container.appendChild(div);
        }
        document.getElementById('stats').innerText = `總計: ${totalSlots} 格 | 已佔用: ${usedCount} 格`;
    }

    function toggleBatchMode() {
        isBatchMode = !isBatchMode;
        document.getElementById('batch-btn').innerText = isBatchMode ? "退出批量模式" : "進入批量模式";
        if (!isBatchMode) { selectedSlots.clear(); render(); }
    }

    function batchAction(status) {
        if (selectedSlots.size === 0) return alert("請先選取格子！");
        selectedSlots.forEach(i => slotStates[i] = status);
        selectedSlots.clear();
        saveToGoogle();
        toggleBatchMode();
    }

    // 初始化
    loadData();
</script>
</body>
</html>
